---
# From: https://github.com/Ekumen-OS/andino/tree/jazzy/andino_hardware
#

- name: Decide whether camera support is enabled
  ansible.builtin.set_fact:
    andino_camera_enabled: "{{ andino_camera_enabled | default(false) | bool }}"

- name: Install RPi Camera dependencies
  ansible.builtin.apt:
    pkg:
      - libraspberrypi-bin
      - v4l-utils
      - raspi-config
    state: present
    update_cache: true
    cache_valid_time: 3600
  become: true
  when: andino_camera_enabled

- name: Add user to dialout group to be able to use serial ports and camera
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: "dialout,plugdev,video"
    append: true
  become: true

- name: Check whether vcgencmd exists
  ansible.builtin.command: which vcgencmd
  register: vcgencmd_check
  changed_when: false
  failed_when: false
  when: andino_camera_enabled

- name: Read RPi camera status
  ansible.builtin.command: vcgencmd get_camera
  register: camera_state
  changed_when: false
  failed_when: false
  when:
    - andino_camera_enabled
    - vcgencmd_check.rc == 0

- name: Warn if camera support is enabled but camera was not detected
  ansible.builtin.set_fact:
    common_warnings: "{{ common_warnings | default([]) + ['RPi camera not detected'] }}"
  when:
    - andino_camera_enabled
    - camera_state is defined
    - "'supported=1 detected=1' not in (camera_state.stdout | default(''))"

- name: Configure RPi camera if it isn't detected
  ansible.builtin.command: raspi-config nonint do_camera 1
  become: true
  changed_when: true
  failed_when: false
  when:
    - andino_camera_enabled
    - camera_state is defined
    - "'supported=1 detected=1' not in (camera_state.stdout | default(''))"

- name: Skip camera setup when camera support is disabled
  ansible.builtin.debug:
    msg: "Skipping Raspberry Pi camera setup because andino_camera_enabled=false"
  when: not andino_camera_enabled

- name: Configure serial port names for Arduino and Lidar
  ansible.builtin.template:
    src: 10-usb-serial.rules.j2
    dest: /etc/udev/rules.d/10-usb-serial.rules
    mode: u=rw,g=r,o=r
  become: true
  register: usb_serial_rules

- name: Reload udev rules for serial
  ansible.builtin.shell: udevadm control --reload-rules && udevadm trigger
  become: true
  when: usb_serial_rules.changed  # noqa: no-handler
  changed_when: true

- name: Verify custom Arduino serial port exists
  ansible.builtin.stat:
    path: "/dev/{{ andino_arduino_serial.name }}"
  register: andino_arduino_serial_result
  failed_when: not andino_arduino_serial_result.stat.exists

- name: Verify custom Lidar serial port exists
  ansible.builtin.stat:
    path: "/dev/{{ andino_lidar_serial.name }}"
  register: andino_lidar_serial_result
  failed_when: not andino_lidar_serial_result.stat.exists

- name: Install PlatformIO dependencies
  ansible.builtin.apt:
    name: python3-venv
    state: present
    update_cache: true
    cache_valid_time: 3600
  become: true

- name: Download PlatformIO installer
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/platformio/platformio-core-installer/master/get-platformio.py
    dest: /tmp/get-platformio.py
    mode: "0775"

- name: Install PlatformIO
  ansible.builtin.command: python3 /tmp/get-platformio.py
  register: pio_install
  changed_when: pio_install.rc == 0

- name: Add PlatformIO to the PATH
  ansible.builtin.lineinfile:
    path: "/home/{{ ansible_user }}/.bashrc"
    line: "export PATH=$PATH:/home/{{ ansible_user }}/.platformio/penv/bin"

- name: Download udev rules for PlatformIO
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/platformio/platformio-core/develop/platformio/assets/system/99-platformio-udev.rules
    dest: /etc/udev/rules.d/99-platformio-udev.rules
    mode: u=rw,g=r,o=r
  become: true
  register: platformio_rules

- name: Reload udev rules for platformio
  ansible.builtin.shell: udevadm control --reload-rules && udevadm trigger
  become: true
  when: platformio_rules.changed  # noqa: no-handler
  changed_when: true
